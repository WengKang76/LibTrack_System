{% extends "base.html" %}

{% block extra_css %}
<link
    rel="stylesheet"
    href="{{ url_for(
        'static',
        filename='css/authentication.css'
    ) }}"
>
{% endblock %}

{% block content %}

<div class="authentication-page">

    <div class="authentication-card">

        <div class="authentication-header">
            <h1>Login to LibTrack</h1>

            <p>
                Enter your registered email address and
                password to access the system.
            </p>
        </div>

        {% if error_message %}
            <div class="authentication-error">
                {{ error_message }}
            </div>
        {% endif %}

        <form
            method="POST"
            action="/auth/login"
            class="authentication-form"
            novalidate
        >

            <div class="form-group">
                <label for="email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    value="{{ form_data.get(
                        'email',
                        ''
                    ) }}"
                    maxlength="120"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    class="password-input"
                    autocomplete="current-password"
                    required
                >
            </div>

            <label class="show-password-control">
                <input
                    type="checkbox"
                    id="show_password"
                >

                Show password
            </label>

            <button
                type="submit"
                class="button authentication-button"
            >
                Login
            </button>

            <div class="authentication-links">
                <a href="/auth/register">
                    Register Student Account
                </a>

                <a href="/auth/forgot-password">
                    Forgot Password?
                </a>
            </div>

        </form>

    </div>

</div>

<script>
    const showPasswordCheckbox =
        document.getElementById("show_password");

    const passwordInput =
        document.getElementById("password");

    showPasswordCheckbox.addEventListener(
        "change",
        function () {
            passwordInput.type = this.checked
                ? "text"
                : "password";
        }
    );
</script>

{% endblock %}
