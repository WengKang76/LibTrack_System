{% extends "base.html" %}

{% block extra_css %}
<link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/book_catalogue.css') }}"
>
{% endblock %}

{% block content %}

<div class="delete-card">

    <h1>Delete Book Record</h1>

    <p>
        Are you sure you want to delete this book?
    </p>

    <div class="book-summary">
        <p>
            <strong>Title:</strong>
            {{ book.get('title', '-') }}
        </p>

        <p>
            <strong>Author:</strong>
            {{ book.get('author', '-') }}
        </p>

        <p>
            <strong>ISBN:</strong>
            {{ book.get('isbn', '-') }}
        </p>
    </div>

    <div class="form-actions">

        <form
            method="POST"
            action="{{ url_for(
                'book_catalogue.delete_book',
                book_id=book.book_id
            ) }}"
        >
            <button
                type="submit"
                class="button button-danger"
            >
                Delete Book
            </button>
        </form>

        <a
            href="{{ url_for('book_catalogue.manage_books') }}"
            class="button button-secondary"
        >
            Cancel
        </a>

    </div>

</div>

{% endblock %}
