name: LibTrack CI Testing

on:
  push:
    branches:
      - TestMain2
      - main

  pull_request:
    branches:
      - TestMain2
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: libtrack-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  automated-testing:
    name: Run LibTrack Automated Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TESTING: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        shell: bash
        run: |
          if [ -f "requirements.txt" ]; then
            python -m pip install -r requirements.txt
          elif [ -f "requirement.txt" ]; then
            python -m pip install -r requirement.txt
          else
            echo "Error: requirements.txt or requirement.txt was not found."
            exit 1
          fi

          python -m pip install pytest pytest-html

      - name: Create test report folder
        run: mkdir -p reports

      - name: Run complete pytest suite
        run: |
          python -m pytest \
            --tb=short \
            --html=reports/libtrack-test-report.html \
            --self-contained-html \
            --junitxml=reports/junit-test-results.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: libtrack-test-reports-${{ github.run_number }}
          path: reports/
          if-no-files-found: warn
          retention-days: 14